name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate and generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install schema toolchain
        run: |
          npm install -g json-schema-to-typescript ajv-cli ajv-formats
          go install github.com/atombender/go-jsonschema@latest

      - name: Lint JSON syntax
        run: |
          for f in $(find schemas examples -name '*.json'); do
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done

      - name: Validate examples
        run: make validate

      - name: Generate types (smoke test)
        run: make generate

      - name: Check generated types are up to date
        run: git diff --exit-code go/ ts/src/

      - name: Build Go submodule
        working-directory: go
        run: go build ./...

      - name: Build TS package
        working-directory: ts
        run: |
          npm ci
          npm run build
          npm run typecheck
